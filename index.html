<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArP 的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow: hidden;
      background: #0c1445;
      position: relative;
    }
    /* 梵高星空背景层 */
    .sky-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .sky-base {
      background: radial-gradient(ellipse at center, #1e3a8a 0%, #0c1445 70%, #000000 100%);
    }
    .swirls {
      background: 
        radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(255, 215, 0, 0.4) 0%, transparent 50%);
      animation: swirl 20s linear infinite;
    }
    @keyframes swirl {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .stars {
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #fff, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, #fff, transparent),
        radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 160px 30px, #fff, transparent);
      background-repeat: repeat;
      background-size: 200px 100px;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    .moon {
      position: absolute;
      top: 10%;
      right: 10%;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #f5f5dc 0%, #e6e6fa 50%, #d3d3d3 100%);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(245, 245, 220, 0.5);
      animation: glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow {
      0% { box-shadow: 0 0 20px rgba(245, 245, 220, 0.5); }
      100% { box-shadow: 0 0 30px rgba(245, 245, 220, 0.8); }
    }
    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      perspective: 1000px;
    }
    .card-container {
      width: 300px;
      height: 450px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }
    .card-container.flipped {
      transform: rotateY(180deg);
    }
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card-front {
      background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
      color: #fff;
      border: 2px solid #ffd700;
    }
    .card-front::before {
      content: '🌙';
      font-size: 80px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .card-front h2 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #ffd700;
    }
    .card-front p {
      font-size: 16px;
      opacity: 0.8;
    }
    .card-back {
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      transform: rotateY(180deg);
      border: 2px solid #4a5568;
    }
    .card-back h1 {
      font-size: 28px;
      margin-bottom: 15px;
      background: linear-gradient(45deg, #2d3748, #1a202c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-back .bio {
      margin-bottom: 20px;
      line-height: 1.6;
      font-size: 16px;
    }
    .card-back .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .card-back .links a {
      padding: 10px 15px;
      background: linear-gradient(45deg, #ffd700, #ffed4e);
      color: #2d3748;
      text-decoration: none;
      border-radius: 25px;
      transition: all 0.3s ease;
      text-align: center;
      font-weight: bold;
    }
    .card-back .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .social-icons a {
      color: #2d3748;
      font-size: 24px;
      transition: all 0.3s ease;
    }
    .social-icons a:hover {
      transform: scale(1.2);
      color: #ffd700;
    }
    .footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }
    @media (max-width: 768px) {
      .card-container {
        width: 250px;
        height: 375px;
      }
      .card-front::before {
        font-size: 60px;
      }
      .card-front h2 {
        font-size: 20px;
      }
      .card-back h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="sky-layer sky-base"></div>
  <div class="sky-layer swirls"></div>
  <div class="sky-layer stars"></div>
  <div class="moon"></div>
  <div class="container">
    <div class="card-container" id="cardContainer">
      <div class="card card-front">
        <h2>点击揭示</h2>
        <p>探索我的世界</p>
      </div>
      <div class="card card-back">
        <h1>我是 ArP</h1>
        <p class="bio">编程爱好者 / 创意开发者 / 终身学习者<br>热爱探索新技术，构建有趣的项目，与志同道合的朋友分享知识。</p>
        <div class="links">
          <a href="https://github.com/ArP1025">GitHub</a>
          <a href="blog.html">博客</a>
          <a href="about.html">关于我</a>
        </div>
        <div class="social-icons">
          <a href="#" title="Twitter">🐦</a>
          <a href="#" title="LinkedIn">💼</a>
          <a href="#" title="Email">📧</a>
        </div>
      </div>
    </div>
  </div>
  <div class="footer">© 2026 ArP. Made with ❤️ and code.</div>
  <script>
    // 卡片翻转效果
    const cardContainer = document.getElementById('cardContainer');
    cardContainer.addEventListener('click', function() {
      this.classList.toggle('flipped');
    });
  </script>
</body>
</html>
