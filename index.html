<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARP 的个人主页</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f7f8fa;display:flex;align-items:center;justify-content:center;height:100vh;color:#333}
    .card{background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);text-align:center;max-width:500px;width:90%}
    h1{font-size:28px;margin-bottom:12px}
    .bio{color:#666;margin-bottom:24px}
    .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .links a{padding:10px 18px;border:1px solid #ddd;border-radius:8px;text-decoration:none;color:#333}
    .links a:hover{background:#f1f1f1}
    .foot{margin-top:30px;font-size:14px;color:#999}
  </style>
</head>
<body>
  <div class="card">
    <h1>我是 ARP</h1>
    <p class="bio">编程爱好者 / 个人主页</p>
    <div class="links">
      <a href="https://github.com">GitHub</a>
      <a href="#">Blog</a>
      <a href="#">About</a>
    </div>
    <div class="foot">arp.zle.ee © 2026</div>
  </div>
</body>
</html>
